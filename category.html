<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capitol — Mathorizon</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/images/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/theme.js"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="nav">
    <div class="nav__inner container">
      <a class="nav__brand" href="index.html">
        <img class="nav__logo" src="assets/images/MathorizonLogo.png" alt="Mathorizon">
        <span class="nav__name">Math<b>orizon</b></span>
      </a>
      <div class="nav__links">
        <a class="nav__link nav__link--active" href="index.html">Capitole</a>
        <a class="nav__link" href="bac.html?new=1">Simulare</a>
        <a class="nav__link" href="training.html">Antrenament Rapid</a>
        <a class="nav__link" href="classes.html">Clase</a>
        <a class="nav__link" href="#">Pachete</a>
      </div>
      <button class="nav__hamburger" id="navHamburger" aria-label="Meniu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav__right">
        <div class="token-widget" id="tokenWidget" title="ExamTokenuri disponibile">
          <span class="token-widget__icon">🎟</span>
          <span class="token-widget__count" data-token-count>—</span>
          <span class="token-widget__label">Tokenuri</span>
        </div>
        <button class="nav-icon-btn" id="favBtn" title="Exerciții favorite">♡</button>
        <button class="nav-icon-btn" id="histBtn" title="Istoric rezolvări">◷</button>
        <button class="theme-btn" id="themeBtn" onclick="BM.toggleTheme()" title="Schimbă tema">☽</button>
        <button class="nav-profile-btn" id="navProfileBtn" title="Conectează-te">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="nav__mobile-menu" id="navMobileMenu">
      <a class="nav__mobile-link nav__mobile-link--active" href="index.html">Capitole</a>
      <a class="nav__mobile-link" href="bac.html?new=1">Simulare</a>
      <a class="nav__mobile-link" href="training.html">Antrenament Rapid</a>
      <a class="nav__mobile-link" href="classes.html">Clase</a>
      <a class="nav__mobile-link" href="#">Pachete</a>
      <div class="nav__mobile-divider"></div>
      <button class="nav__mobile-link nav__mobile-link--action" onclick="document.getElementById('navMobileMenu').classList.remove('open');openFavoritesPanel()">&#9825; Exerciții favorite</button>
      <button class="nav__mobile-link nav__mobile-link--action" onclick="document.getElementById('navMobileMenu').classList.remove('open');openHistoryPanel()">&#9711; Istoric rezolvări</button>
    </div>
  </nav>

  <!-- CATEGORY HEADER -->
  <div class="cat-header" id="catHeader">
    <div class="container">
      <div class="cat-header__inner">
        <div class="cat-header__icon" style="opacity:0.3">…</div>
        <div class="cat-header__info">
          <div class="loading-card" style="height:24px;width:200px;margin-bottom:8px"></div>
          <div class="loading-card" style="height:16px;width:300px"></div>
        </div>
      </div>
    </div>
  </div>


  <!-- VIEW: Subcategory Cards -->
  <div id="subcatCardsSection" class="main container">
    <div class="main-blob main-blob--pink" aria-hidden="true"></div>
    <div class="main-blob main-blob--blue" aria-hidden="true"></div>
    <div class="subcat-cards-grid" id="subcatCardsGrid">
      <div class="loading-card" style="height:140px"></div>
      <div class="loading-card" style="height:140px"></div>
      <div class="loading-card" style="height:140px"></div>
      <div class="loading-card" style="height:140px"></div>
    </div>
  </div>

  <!-- VIEW: Exercises (hidden until subcategory selected) -->
  <div id="exercisesSection" style="display:none">

    <!-- Sticky breadcrumb -->
    <div class="subcat-breadcrumb" id="subcatBreadcrumb">
      <!-- Injected by JS -->
    </div>

    <!-- Filter + Exercises -->
    <main class="main container">
      <div class="filter-bar" id="filterBar"></div>
      <div class="exercises-container" id="exercisesContainer">
        <div class="loading-card" style="height:80px"></div>
        <div class="loading-card" style="height:80px"></div>
        <div class="loading-card" style="height:80px"></div>
      </div>
    </main>

  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="BM.closeAllPanels()"></div>

  <!-- PANEL: Favorites -->
  <aside class="panel" id="panel-fav">
    <div class="panel__head">
      <h3>Favorite în capitol</h3>
      <button class="icon-btn" onclick="BM.closeAllPanels()">✕</button>
    </div>
    <div class="panel__body" id="favList"></div>
  </aside>

  <!-- PANEL: Istoric -->
  <aside class="panel" id="panel-hist">
    <div class="panel__head">
      <h3>Istoric Rezolvări</h3>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn--surface" style="font-size:0.75rem;padding:4px 10px;height:32px" onclick="clearHistory()" title="Șterge istoricul">Șterge tot</button>
        <button class="icon-btn" onclick="BM.closeAllPanels()" title="Închide">✕</button>
      </div>
    </div>
    <div class="panel__body" id="histList">
      <div class="empty-state">
        <div class="empty-icon">◷</div>
        <p>Nu ai rezolvat niciun exercițiu.</p>
        <p class="text-muted">Exercițiile rezolvate vor apărea aici.</p>
      </div>
    </div>
  </aside>

  <button class="scroll-top-btn" id="scrollTopBtn" aria-label="Înapoi sus" title="Înapoi sus">↑</button>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/panels.js"></script>
  <script src="js/category.js"></script>
</body>
</html>
