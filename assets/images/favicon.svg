<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#1B4A8A"/>

  <!-- Coordinate axes -->
  <line x1="5" y1="54" x2="59" y2="54" stroke="white" stroke-width="0.7" opacity="0.18"/>
  <line x1="8" y1="10" x2="8" y2="55" stroke="white" stroke-width="0.7" opacity="0.18"/>

  <!-- Axis tick marks -->
  <line x1="20" y1="52" x2="20" y2="56" stroke="white" stroke-width="0.7" opacity="0.18"/>
  <line x1="32" y1="52" x2="32" y2="56" stroke="white" stroke-width="0.7" opacity="0.18"/>
  <line x1="44" y1="52" x2="44" y2="56" stroke="white" stroke-width="0.7" opacity="0.18"/>
  <line x1="6" y1="26" x2="10" y2="26" stroke="white" stroke-width="0.7" opacity="0.18"/>
  <line x1="6" y1="40" x2="10" y2="40" stroke="white" stroke-width="0.7" opacity="0.18"/>

  <!-- Math symbols in background -->
  <text x="38" y="62" font-family="Georgia,serif" font-size="11" fill="white" opacity="0.22">π</text>
  <text x="50" y="18" font-family="Georgia,serif" font-size="13" fill="white" opacity="0.22">∫</text>
  <text x="14" y="13" font-family="Georgia,serif" font-size="9" fill="white" opacity="0.22">√</text>

  <!-- Main graph line -->
  <polyline points="8,46 20,26 32,34 44,14 56,22"
    fill="none" stroke="white" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data point circles -->
  <circle cx="8"  cy="46" r="2.2" fill="#1B4A8A" stroke="white" stroke-width="1.5"/>
  <circle cx="20" cy="26" r="2.2" fill="#1B4A8A" stroke="white" stroke-width="1.5"/>
  <circle cx="32" cy="34" r="2.2" fill="#1B4A8A" stroke="white" stroke-width="1.5"/>
  <circle cx="44" cy="14" r="2.2" fill="#1B4A8A" stroke="white" stroke-width="1.5"/>
  <circle cx="56" cy="22" r="2.2" fill="#1B4A8A" stroke="white" stroke-width="1.5"/>
</svg>
